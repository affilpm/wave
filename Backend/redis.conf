# =============================================================================
# Redis configuration for Wave Backend — optimized for 1GB RAM servers
# =============================================================================

# Memory limit — hard cap to prevent OOM
maxmemory 40mb

# Eviction policy — remove least recently used keys when memory is full
maxmemory-policy allkeys-lru

# Disable RDB snapshotting to reduce I/O and memory spikes
save ""

# Use append-only file for durability (smaller memory footprint than RDB)
appendonly yes
appendfsync everysec

# Reduce TCP backlog for low-traffic servers
tcp-backlog 128

# Close idle connections after 300 seconds
timeout 300

# Keep-alive interval
tcp-keepalive 60

# Limit log output
loglevel warning

# Disable unused features to save memory
# No Lua scripting cache
lua-replicate-commands yes
