# =============================================================================
# Nginx configuration for Wave Backend
# =============================================================================
# Security headers, gzip, static/media serving, WebSocket proxy
# =============================================================================

server {
    listen 80;
    server_name api.affils.site;  # TODO: Replace with your domain

    # -------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' https: wss:;" always;

    # -------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.apple.mpegurl;  # HLS .m3u8 playlists

    # Do NOT compress HLS .ts segments (already compressed video)
    location ~* \.ts$ {
        gzip off;
    }

    # -------------------------------------------------------------------
    # Favicon — suppress 404 logs
    # -------------------------------------------------------------------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------
    # Static files — served directly by Nginx
    # -------------------------------------------------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------
    # Media files — served directly by Nginx
    # -------------------------------------------------------------------
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # -------------------------------------------------------------------
    # Proxy to Django/Daphne (HTTP + WebSocket)
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # -------------------------------------------------------------------
    # Max upload size
    # -------------------------------------------------------------------
    client_max_body_size 134M;
}