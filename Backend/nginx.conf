# =============================================================================
# Nginx configuration for Wave Backend (Docker)
# =============================================================================
# Reverse proxy to Django/Daphne, static & media serving, security headers
# =============================================================================

# Minimal worker config for low-memory server
worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging — reduced for low-memory
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.apple.mpegurl;

    # Upstream — point to Docker service name
    upstream django {
        server web:8085;
    }

    server {
        listen 80;
        server_name _;

        # -------------------------------------------------------------------
        # Security Headers
        # -------------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # -------------------------------------------------------------------
        # Max upload size (audio files)
        # -------------------------------------------------------------------
        client_max_body_size 134M;

        # -------------------------------------------------------------------
        # Favicon — suppress 404 logs
        # -------------------------------------------------------------------
        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        # -------------------------------------------------------------------
        # Static files — served directly by Nginx
        # -------------------------------------------------------------------
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # -------------------------------------------------------------------
        # Media files — served directly by Nginx
        # -------------------------------------------------------------------
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Do NOT compress HLS .ts segments (already compressed audio)
        location ~* \.ts$ {
            gzip off;
        }

        # -------------------------------------------------------------------
        # Proxy to Django/Daphne (HTTP + WebSocket)
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
            send_timeout 300;
        }
    }
}