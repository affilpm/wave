# =============================================================================
# Docker Compose for Wave Backend — Optimized for 1GB RAM servers
# =============================================================================
# Memory budget:
#   Nginx:      20MB  |  PostgreSQL: 150MB  |  Redis: 50MB
#   Django:    250MB  |  Celery:     200MB  |  OS+Docker: ~150MB
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Nginx — Reverse proxy, static/media serving
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: wave-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      # Uncomment for SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    mem_limit: 20m
    memswap_limit: 40m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Django — ASGI server (Daphne)
  # -------------------------------------------------------------------------
  web:
    build: .
    container_name: wave-backend
    restart: unless-stopped
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - CELERY_WORKER_CONCURRENCY=1
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 400m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.socket(); s.connect(('127.0.0.1', 8000))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -------------------------------------------------------------------------
  # Celery Worker — HLS transcoding (single worker for low RAM)
  # -------------------------------------------------------------------------
  celery:
    build: .
    container_name: wave-celery
    restart: unless-stopped
    command: >
      sh -c "celery -A Backend worker
      --loglevel=info
      --concurrency=1
      --max-tasks-per-child=5
      --without-heartbeat
      --without-mingle
      --without-gossip"
    volumes:
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 200m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "sh", "-c", "/opt/venv/bin/celery -A Backend inspect ping --timeout 10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # PostgreSQL — tuned for low memory
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: wave-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=96MB
      -c max_connections=30
      -c wal_buffers=1MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
    mem_limit: 150m
    memswap_limit: 200m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-wave}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis — capped memory with LRU eviction
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wave-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    mem_limit: 50m
    memswap_limit: 60m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data: